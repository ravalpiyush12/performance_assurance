<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select LOB - CQE NFT Platform</title>
<link rel="stylesheet" href="../../css/global.css">
<style>
.lob-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:24px}
.lob-card{background:white;border-radius:18px;padding:28px 20px;text-align:center;box-shadow:var(--card-shadow);cursor:pointer;border:3px solid transparent;transition:all .25s;position:relative}
.lob-card:hover{transform:translateY(-5px);box-shadow:var(--card-hover);border-color:var(--primary)}
.lob-card.selected{border-color:var(--primary);background:linear-gradient(135deg,#eff6ff,#dbeafe);box-shadow:0 0 0 4px rgba(102,126,234,.18)}
.lob-card.selected::after{content:'✓';position:absolute;top:10px;right:14px;font-size:16px;color:var(--primary);font-weight:800}
.lob-icon{font-size:44px;margin-bottom:12px}
.lob-name{font-size:17px;font-weight:800;margin-bottom:6px;color:#1f2937}
.lob-meta{font-size:12px;color:#6b7280;margin-bottom:10px}
.lob-tracks{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-top:8px}
.track-chip{background:#eff6ff;color:var(--primary);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.btn-row{display:flex;gap:14px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:18px;height:180px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top-nav">
  <a href="../../pages/landing.html" class="nav-link">🏠 Home</a>
</div>

<div class="container" style="margin-top:80px">
  <div class="card" style="max-width:960px;margin:0 auto">
    <div style="text-align:center;margin-bottom:8px">
      <h2 style="font-size:28px;font-weight:800;background:var(--bg-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
        ⚡ Test Monitoring Activity
      </h2>
      <p style="color:#6b7280;margin-top:8px">Select your Line of Business to begin</p>
    </div>

    <div class="alert alert-info" style="margin-top:16px">
      <span>ℹ️</span>
      <span>Select your LOB. You will be asked to login on the next step. Admin users will access all configuration screens for that LOB.</span>
    </div>

    <!-- Loading skeletons -->
    <div id="loadingGrid" class="lob-grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

    <!-- Error state -->
    <div id="errorState" style="display:none;margin-top:16px"></div>

    <!-- LOB grid -->
    <div id="lobGrid" class="lob-grid" style="display:none"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="window.location.href='../../pages/landing.html'">← Back to Home</button>
      <button class="btn btn-primary" id="continueBtn" disabled onclick="continueToLogin()">
        Continue to Login →
      </button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api/v1/auth';

// LOB icons mapped by name
const LOB_ICONS = {
  'Digital Technology':  '💻',
  'Payments':            '💳',
  'Corporate':           '🏢',
  'Retail Banking':      '🏦',
  'Wealth Management':   '📈',
  'Insurance':           '🛡️',
};
function getIcon(name) {
  // Exact match first
  if (LOB_ICONS[name]) return LOB_ICONS[name];
  // Partial match
  const lower = name.toLowerCase();
  if (lower.includes('digital'))  return '💻';
  if (lower.includes('pay'))      return '💳';
  if (lower.includes('corp'))     return '🏢';
  if (lower.includes('retail'))   return '🏦';
  if (lower.includes('wealth'))   return '📈';
  if (lower.includes('insur'))    return '🛡️';
  return '📊';
}

let selectedLob = null;
let lobData = [];

// ─── Load LOBs from public endpoint ──────────────────────────────────────────
async function loadLOBs() {
  try {
    const r = await fetch(API + '/lob-config/public', {
      headers: { 'Content-Type': 'application/json' }
    });

    if (!r.ok) throw new Error('Server returned ' + r.status);
    const data = await r.json();

    if (!data.success || !data.lobs || !data.lobs.length) {
      throw new Error(data.detail || 'No active LOBs found in database');
    }

    lobData = data.lobs;
    renderLOBs(lobData);

  } catch (e) {
    console.error('LOB load error:', e);
    showError(e.message);
  }
}

function renderLOBs(lobs) {
  document.getElementById('loadingGrid').style.display = 'none';

  const grid = document.getElementById('lobGrid');
  grid.style.display = 'grid';

  grid.innerHTML = lobs.map(l => `
    <div class="lob-card" id="lc-${sanitize(l.name)}" onclick="selectLob('${sanitize(l.name)}')">
      <div class="lob-icon">${getIcon(l.name)}</div>
      <div class="lob-name">${l.name}</div>
      <div class="lob-meta">${l.track_count} track${l.track_count !== 1 ? 's' : ''}</div>
      <div class="lob-tracks">
        ${l.tracks.map(t => `<span class="track-chip">${t}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function showError(msg) {
  document.getElementById('loadingGrid').style.display = 'none';
  const err = document.getElementById('errorState');
  err.style.display = 'block';
  err.innerHTML = `
    <div class="alert alert-warning">
      <span>⚠️</span>
      <span>Could not load LOBs from server: <strong>${msg}</strong>
        <br><small style="font-weight:400">Check that backend is running and API_LOB_MASTER has active records.</small>
      </span>
    </div>`;
  // Still show a fallback grid so the page isn't broken
  const fallback = [{name:'Digital Technology', tracks:['CDV3','Track1','Track2'], track_count:3, database:'CQE_NFT'}];
  lobData = fallback;
  renderLOBs(fallback);
}

function sanitize(s) {
  return s.replace(/[^a-zA-Z0-9]/g, '_');
}

// ─── Select LOB ───────────────────────────────────────────────────────────────
function selectLob(safeId) {
  // Find the actual LOB from lobData
  selectedLob = lobData.find(l => sanitize(l.name) === safeId);
  if (!selectedLob) return;

  document.querySelectorAll('.lob-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('lc-' + safeId).classList.add('selected');
  document.getElementById('continueBtn').disabled = false;
}

// ─── Continue to Login ────────────────────────────────────────────────────────
function continueToLogin() {
  if (!selectedLob) return;

  // Store full LOB object in sessionStorage
  // This is what ALL other pages read via:
  //   JSON.parse(sessionStorage.getItem('selectedLob') || '{}')
  sessionStorage.setItem('selectedLob', JSON.stringify({
    name:     selectedLob.name,
    tracks:   selectedLob.tracks,
    database: selectedLob.database,
    icon:     getIcon(selectedLob.name),
    id:       sanitize(selectedLob.name),
  }));

  window.location.href = 'login.html';
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadLOBs();
</script>
</body>
</html>
