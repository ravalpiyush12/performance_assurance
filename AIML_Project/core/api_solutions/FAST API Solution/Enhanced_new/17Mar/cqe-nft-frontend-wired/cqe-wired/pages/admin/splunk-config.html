<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splunk Configuration</title>
<link rel="stylesheet" href="../../css/global.css">
<style>
.dash-block{border:2px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px;background:white}
.dash-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.data-preview{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px;margin-top:10px;font-size:13px}
.data-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;margin-top:10px;font-size:13px;color:#92400e}
</style>
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded',function(){
  const s=JSON.parse(sessionStorage.getItem('userSession')||'{}');
  if(!s.username){window.location.href='../../pages/monitoring/pre-login.html';return;}
  if(sessionStorage.getItem('navFrom')==='pe'){
    sessionStorage.removeItem('navFrom');
    document.querySelectorAll('a.nav-link').forEach(function(el){
      if(el.getAttribute('href')==='dashboard.html'){el.href='../monitoring/start-monitoring.html';el.textContent='← Back to Monitoring';}
    });
  }
});
</script>
<div class="top-nav">
  <a href="../../pages/landing.html" class="nav-link">🏠 Home</a>
  <a href="dashboard.html" class="nav-link">← Admin Dashboard</a>
  <a href="audit-logs.html" class="nav-link">📋 Audit Logs</a>
  <a href="#" class="nav-link" onclick="logout()">🚪 Logout</a>
</div>
<div class="container" style="margin-top:80px">
  <div class="platform-header"><h1>🔍 Splunk Configuration</h1><p>LOB: <strong id="lobLabel">—</strong></p></div>
  <div class="card">
    <h3 style="font-weight:800;margin-bottom:20px">🔌 Connection Settings</h3>
    <div class="form-grid">
      <div class="form-group"><label>Splunk Base URL <span class="required">*</span></label><input type="text" id="splUrl" placeholder="https://splunk.corp.internal:8089"></div>
      <div class="form-group"><label>Token Env Variable <span class="required">*</span></label><input type="text" id="splTokenEnv" placeholder="SPLUNK_TOKEN_CARDS"><small>Env var name holding HEC/API token</small></div>
      <div class="form-group"><label>Default Index</label><input type="text" id="splIndex" placeholder="cards_prod"></div>
      <div class="form-group"><label>Search Timeout (s)</label><input type="number" id="splTimeout" value="60"></div>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-success" onclick="testConn()">🔍 Test Connection</button>
      <button class="btn btn-primary" onclick="saveConn()">💾 Save</button>
    </div>
    <div id="connResult" style="margin-top:12px;display:none"></div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <h3 style="font-weight:800;margin:0">📋 Saved Searches / Dashboards</h3>
      <button class="btn btn-primary" style="padding:9px 18px;font-size:13px" onclick="addDash()">➕ Add Search</button>
    </div>
    <div class="alert alert-info"><span>ℹ️</span><span>Map Splunk saved searches to tracks. Use <strong>Test</strong> to verify data. If no data, contact Application Development team.</span></div>
    <div id="dashList"></div>
  </div>
</div>
<template id="tmpl">
  <div class="dash-block" id="dash-__IDX__">
    <div class="dash-block-header">
      <span style="font-weight:700;font-size:15px">Search __NUM__</span>
      <div style="display:flex;gap:8px">
        <span class="badge" id="dstatus-__IDX__" style="background:#e5e7eb;color:#374151">Not Tested</span>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="removeDash(__IDX__)">✕</button>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Search Name / Dashboard ID <span class="required">*</span></label><input type="text" id="dId-__IDX__" placeholder="Saved search name or dashboard ID"></div>
      <div class="form-group"><label>Display Name <span class="required">*</span></label><input type="text" id="dName-__IDX__" placeholder="e.g. Error Analysis — CDV3"></div>
      <div class="form-group"><label>Track <span class="required">*</span></label>
        <select id="dTrack-__IDX__"><option value="">-- Select Track --</option><option>CDV3</option><option>Track1</option><option>Track2</option><option>PayTrack1</option><option>PayTrack2</option><option>CorpTrack1</option></select>
      </div>
      <div class="form-group"><label>Type</label>
        <select id="dType-__IDX__"><option value="search">Saved Search (SPL)</option><option value="dashboard">Dashboard ID</option></select>
      </div>
    </div>
    <div class="form-group"><label>SPL Query</label><textarea id="dSpl-__IDX__" rows="2" placeholder="index=app_logs | stats count by status"></textarea></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" style="padding:8px 16px;font-size:13px" onclick="saveDash(__IDX__)">💾 Save</button>
      <button class="btn btn-success" style="padding:8px 16px;font-size:13px" onclick="testDash(__IDX__)">🔍 Test — Check Data</button>
      <button class="btn btn-danger" style="padding:8px 14px;font-size:13px" id="delBtn-__IDX__" onclick="deleteDash(__IDX__)" style="display:none">🗑 Delete</button>
    </div>
    <input type="hidden" id="dConfigId-__IDX__" value="">
    <div id="dResult-__IDX__" style="display:none"></div>
  </div>
</template>
<script>
const API='http://localhost:8000/api/v1/nft';
const lob=JSON.parse(sessionStorage.getItem('selectedLob')||'{}');
const lobName=lob.name||'';
const sess=JSON.parse(sessionStorage.getItem('userSession')||'{}');
const tok=sess.session_id||'';
document.getElementById('lobLabel').textContent=lobName||'Unknown LOB';
function hdr(){return{'Content-Type':'application/json','X-Session-Token':tok};}
async function apiGet(u){const r=await fetch(u,{headers:hdr()});if(!r.ok)throw new Error(await r.text());return r.json();}
async function apiPost(u,b){const r=await fetch(u,{method:'POST',headers:hdr(),body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function apiDel(u){const r=await fetch(u,{method:'DELETE',headers:hdr()});if(!r.ok)throw new Error(await r.text());return r.json();}
function showEl(id,html){const el=document.getElementById(id);if(el){el.style.display='block';el.innerHTML=html;}}
function ok(m){return`<div class="alert alert-success"><span>✓</span><span>${m}</span></div>`;}
function err(m){return`<div class="alert alert-danger"><span>✗</span><span>${m}</span></div>`;}
function wait(m){return`<div class="alert alert-info"><span>⏳</span><span>${m}</span></div>`;}
let dc=0;
async function init(){
  if(!lobName)return;
  try{
    const d=await apiGet(`${API}/config/splunk/${encodeURIComponent(lobName)}`);
    (d.configs||[]).forEach(c=>addDash({
      id:c.search_name,name:c.display_name,track:c.track_name,
      type:c.search_type,spl:c.spl_query||'',configId:c.splunk_config_id,status:c.last_test_status
    }));
  }catch(e){}
}
function addDash(prefill){
  const idx=dc++;
  const tmpl=document.getElementById('tmpl').innerHTML.replace(/__IDX__/g,idx).replace(/__NUM__/g,idx+1);
  const wrap=document.createElement('div');wrap.innerHTML=tmpl;
  document.getElementById('dashList').appendChild(wrap.firstElementChild);
  if(prefill){
    document.getElementById('dId-'+idx).value=prefill.id||'';
    document.getElementById('dName-'+idx).value=prefill.name||'';
    document.getElementById('dTrack-'+idx).value=prefill.track||'';
    document.getElementById('dType-'+idx).value=prefill.type||'search';
    document.getElementById('dSpl-'+idx).value=prefill.spl||'';
    document.getElementById('dConfigId-'+idx).value=prefill.configId||'';
    if(prefill.configId){const b=document.getElementById('delBtn-'+idx);if(b)b.style.display='inline-flex';}
    if(prefill.status){
      const badge=document.getElementById('dstatus-'+idx);
      if(prefill.status==='PASS'){badge.className='badge badge-success';badge.textContent='✓ Data Found';}
      else if(prefill.status==='FAIL'){badge.className='badge badge-error';badge.textContent='✗ No Data';}
    }
  }
}
function removeDash(idx){const el=document.getElementById('dash-'+idx);if(el)el.remove();}
async function saveDash(idx){
  const searchName=document.getElementById('dId-'+idx).value.trim();
  const name=document.getElementById('dName-'+idx).value.trim();
  const track=document.getElementById('dTrack-'+idx).value;
  if(!searchName||!name||!track){alert('⚠ Search name, Display Name and Track are required.');return;}
  showEl('dResult-'+idx,wait('Saving...'));
  try{
    const splUrl=document.getElementById('splUrl').value.trim();
    const tokenEnv=document.getElementById('splTokenEnv').value.trim();
    await apiPost(`${API}/config/splunk`,{
      lob_name:lobName,track_name:track,splunk_url:splUrl,token_env_var:tokenEnv,
      default_index:document.getElementById('splIndex').value.trim()||null,
      search_name:searchName,display_name:name,
      search_type:document.getElementById('dType-'+idx).value,
      spl_query:document.getElementById('dSpl-'+idx).value||null,
      search_timeout_sec:parseInt(document.getElementById('splTimeout').value)||60
    });
    const badge=document.getElementById('dstatus-'+idx);
    badge.style.background='#dbeafe';badge.style.color='#1d4ed8';badge.textContent='Saved ✓';
    showEl('dResult-'+idx,ok(`Search "${name}" saved.`));
  }catch(e){showEl('dResult-'+idx,err(`Save failed: ${e.message}`));}
}
async function deleteDash(idx){
  const configId=document.getElementById('dConfigId-'+idx).value;
  if(!configId){document.getElementById('dash-'+idx)?.remove();return;}
  if(!confirm('Delete this search config?'))return;
  try{await apiDel(`${API}/config/splunk/${configId}`);document.getElementById('dash-'+idx)?.remove();}
  catch(e){alert('Delete failed: '+e.message);}
}
async function testDash(idx){
  const configId=document.getElementById('dConfigId-'+idx).value;
  const name=document.getElementById('dName-'+idx).value||'Search';
  showEl('dResult-'+idx,'<div class="data-preview">⏳ Running search...</div>');
  if(!configId){showEl('dResult-'+idx,'<div class="data-warn">⚠ Please save this config first.</div>');return;}
  try{
    const d=await apiPost(`${API}/config/splunk/test-connection/${configId}`,{});
    const badge=document.getElementById('dstatus-'+idx);
    if(d.success&&d.status==='PASS'){
      badge.className='badge badge-success';badge.textContent='✓ Data Found';
      showEl('dResult-'+idx,`<div class="data-preview"><strong>✓ Search returned data</strong><br><br>Events: <strong>${(d.event_count||0).toLocaleString()}</strong> · Error events: <strong>${(d.error_events||0).toLocaleString()}</strong><br><small style="color:#065f46">${d.message}</small></div>`);
    }else{
      badge.className='badge badge-error';badge.textContent='✗ No Data';
      showEl('dResult-'+idx,`<div class="data-warn"><strong>⚠ ${d.message}</strong><br><br>${d.contact_app_team?'<strong>👉 Please contact the Application Development team to verify Splunk data ingestion.</strong>':''}</div>`);
    }
  }catch(e){showEl('dResult-'+idx,err(`Test failed: ${e.message}`));}
}
async function testConn(){
  showEl('connResult',wait('Testing Splunk connection...'));
  try{
    const d=await apiGet('http://localhost:8000/api/health/splunk');
    if(d.status==='ok'){showEl('connResult',ok(`Connected to Splunk. Status: ${d.status}.`));}
    else{showEl('connResult',err(`Check returned: ${JSON.stringify(d)}`));}
  }catch(e){showEl('connResult',err(`Error: ${e.message}`));}
}
function saveConn(){
  const url=document.getElementById('splUrl').value.trim();
  const tokenEnv=document.getElementById('splTokenEnv').value.trim();
  if(!url||!tokenEnv){alert('⚠ Splunk URL and Token Env Variable are required.');return;}
  showEl('connResult',ok('Connection settings noted. They will be saved with each search configuration.'));
}
function logout(){sessionStorage.clear();window.location.href='../landing.html';}
init();
</script>
</body>
</html>
