<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppDynamics Configuration</title>
<link rel="stylesheet" href="../../css/global.css">
<style>
.tier-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;padding:10px 12px;background:#f9fafb;border-radius:8px;flex-wrap:wrap}
.tier-row input{flex:1;min-width:120px}
.app-block{border:2px solid #e5e7eb;border-radius:14px;padding:20px;margin-bottom:16px;background:white}
.app-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.app-block-title{font-size:16px;font-weight:800}
.section-divider{margin:28px 0 18px;padding-bottom:10px;border-bottom:2px solid #e5e7eb;font-size:18px;font-weight:800}
</style>
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded',function(){
  const s=JSON.parse(sessionStorage.getItem('userSession')||'{}');
  if(!s.username){window.location.href='../../pages/monitoring/pre-login.html';return;}
  if(sessionStorage.getItem('navFrom')==='pe'){
    sessionStorage.removeItem('navFrom');
    document.querySelectorAll('a.nav-link').forEach(function(el){
      if(el.getAttribute('href')==='dashboard.html'){el.href='../monitoring/start-monitoring.html';el.textContent='← Back to Monitoring';}
    });
  }
});
</script>
<div class="top-nav">
  <a href="../../pages/landing.html" class="nav-link">🏠 Home</a>
  <a href="dashboard.html" class="nav-link">← Admin Dashboard</a>
  <a href="audit-logs.html" class="nav-link">📋 Audit Logs</a>
  <a href="#" class="nav-link" onclick="logout()">🚪 Logout</a>
</div>
<div class="container" style="margin-top:80px">
  <div class="platform-header">
    <h1>📊 AppDynamics Configuration</h1>
    <p>LOB: <strong id="lobLabel">—</strong></p>
  </div>
  <div class="card">
    <div class="section-divider">🔌 Controller Connection</div>
    <div class="form-grid">
      <div class="form-group"><label>Controller URL <span class="required">*</span></label><input type="text" id="appdHost" placeholder="https://appdynamics.corp.internal:8090"></div>
      <div class="form-group"><label>Account Name <span class="required">*</span></label><input type="text" id="appdAccount" placeholder="corp-prod-account"></div>
      <div class="form-group"><label>Token Env Variable <span class="required">*</span></label><input type="text" id="appdTokenEnv" placeholder="APPD_TOKEN_CARDS"><small>Env var name holding API token — never the token itself</small></div>
      <div class="form-group"><label>Default Node Count</label><input type="number" id="defaultNodeCount" value="3" min="1"></div>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-success" onclick="testAppdConn()">🔍 Test Connection</button>
      <button class="btn btn-primary" onclick="saveConnSettings()">💾 Save Connection</button>
    </div>
    <div id="appdConnResult" style="margin-top:12px;display:none"></div>
  </div>
  <div class="card">
    <div class="section-divider">📱 Applications & Tiers</div>
    <div class="alert alert-info"><span>ℹ️</span><span>Define applications and tiers. These are used during monitoring validation.</span></div>
    <div id="appsList"></div>
    <button class="btn btn-primary" onclick="addApp()" style="margin-top:10px">➕ Add New Application</button>
  </div>
</div>
<template id="appTemplate">
  <div class="app-block" id="appBlock-__IDX__">
    <div class="app-block-header">
      <span class="app-block-title">Application __NUM__</span>
      <div style="display:flex;gap:8px">
        <span class="badge badge-info" id="appStatus-__IDX__">New</span>
        <button class="btn btn-danger" style="padding:7px 14px;font-size:13px" onclick="removeApp(__IDX__)">✕ Remove</button>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Application Name <span class="required">*</span></label><input type="text" id="appName-__IDX__" placeholder="e.g. Cards-Prod-App"></div>
      <div class="form-group"><label>Application ID</label><input type="text" id="appId-__IDX__" placeholder="e.g. 173720"></div>
      <div class="form-group"><label>Track <span class="required">*</span></label>
        <select id="appTrack-__IDX__"><option value="">-- Select Track --</option><option>CDV3</option><option>Track1</option><option>Track2</option><option>PayTrack1</option><option>PayTrack2</option><option>CorpTrack1</option></select>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="appEnabled-__IDX__"><option value="active">Active</option><option value="inactive">Inactive</option></select>
      </div>
    </div>
    <div style="font-weight:700;margin-bottom:10px;font-size:14px">Tiers Configuration</div>
    <div id="tiersList-__IDX__"></div>
    <button class="btn btn-secondary" style="padding:8px 16px;font-size:13px;margin-bottom:12px" onclick="addTier(__IDX__)">+ Add Tier</button>
    <button class="btn btn-success" style="padding:9px 20px;font-size:13px" onclick="saveApp(__IDX__)">💾 Save Application</button>
    <div id="appSaveResult-__IDX__" style="margin-top:8px;display:none"></div>
  </div>
</template>
<script>
const API='http://localhost:8000/api/v1/nft';
const APPD_API='http://localhost:8000/api/v1/monitoring/appd';
const lob=JSON.parse(sessionStorage.getItem('selectedLob')||'{}');
const lobName=lob.name||'';
const sess=JSON.parse(sessionStorage.getItem('userSession')||'{}');
const tok=sess.session_id||'';
document.getElementById('lobLabel').textContent=lobName||'Unknown LOB';

function hdr(){return{'Content-Type':'application/json','X-Session-Token':tok};}
async function apiGet(u){const r=await fetch(u,{headers:hdr()});if(!r.ok)throw new Error(await r.text());return r.json();}
async function apiPost(u,b){const r=await fetch(u,{method:'POST',headers:hdr(),body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
function showEl(id,html){const el=document.getElementById(id);if(el){el.style.display='block';el.innerHTML=html;}}
function ok(m){return`<div class="alert alert-success"><span>✓</span><span>${m}</span></div>`;}
function err(m){return`<div class="alert alert-danger"><span>✗</span><span>${m}</span></div>`;}
function wait(m){return`<div class="alert alert-info"><span>⏳</span><span>${m}</span></div>`;}

let appCount=0;

async function init(){
  if(!lobName)return;
  // Load saved connection settings
  try{
    const d=await apiGet(`${API}/config/appd/${encodeURIComponent(lobName)}`);
    if(d.config){
      document.getElementById('appdHost').value=d.config.controller_url||'';
      document.getElementById('appdAccount').value=d.config.account_name||'';
      document.getElementById('appdTokenEnv').value=d.config.token_env_var||'';
      document.getElementById('defaultNodeCount').value=d.config.default_node_count||3;
    }
  }catch(e){}
  // Load applications from appd master
  try{
    const d=await apiGet(`${APPD_API}/master/applications?lob_name=${encodeURIComponent(lobName)}`);
    (d.applications||[]).forEach(a=>addApp({
      name:a.application_name,id:a.app_master_id,
      track:a.track,enabled:a.is_active==='Y'?'active':'inactive',tiers:[]
    }));
  }catch(e){}
}

function addApp(prefill){
  const idx=appCount++;
  const tmpl=document.getElementById('appTemplate').innerHTML.replace(/__IDX__/g,idx).replace(/__NUM__/g,idx+1);
  const wrap=document.createElement('div');wrap.innerHTML=tmpl;
  document.getElementById('appsList').appendChild(wrap.firstElementChild);
  if(prefill){
    document.getElementById('appName-'+idx).value=prefill.name||'';
    document.getElementById('appId-'+idx).value=String(prefill.id||'');
    document.getElementById('appTrack-'+idx).value=prefill.track||'';
    document.getElementById('appEnabled-'+idx).value=prefill.enabled||'active';
    document.getElementById('appStatus-'+idx).className='badge badge-success';
    document.getElementById('appStatus-'+idx).textContent='Saved';
    if(prefill.tiers)prefill.tiers.forEach(t=>addTier(idx,t));
  }
}
function removeApp(idx){const el=document.getElementById('appBlock-'+idx);if(el&&confirm('Remove this application?'))el.remove();}
function addTier(idx,prefill){
  const container=document.getElementById('tiersList-'+idx);
  const div=document.createElement('div');div.className='tier-row';
  div.innerHTML=`<input type="text" placeholder="Tier name" style="flex:2" value="${prefill?.name||''}"><input type="number" placeholder="Expected nodes" style="width:130px;min-width:130px" value="${prefill?.count||3}" min="1"><button class="btn btn-danger" style="padding:8px 14px;font-size:13px;flex-shrink:0" onclick="this.closest('.tier-row').remove()">✕</button>`;
  container.appendChild(div);
}
async function saveApp(idx){
  const name=document.getElementById('appName-'+idx).value;
  const track=document.getElementById('appTrack-'+idx).value;
  if(!name){alert('⚠ Application name is required');return;}
  if(!track){alert('⚠ Track is required');return;}
  const badge=document.getElementById('appStatus-'+idx);
  badge.className='badge badge-info';badge.textContent='Saving...';
  showEl('appSaveResult-'+idx,wait('Saving application...'));
  try{
    const d=await apiPost(`${APPD_API}/applications`,{
      lob_name:lobName,application_name:name,
      track:track,is_active:document.getElementById('appEnabled-'+idx).value==='active'?'Y':'N'
    });
    badge.className='badge badge-success';badge.textContent='Saved ✓';
    showEl('appSaveResult-'+idx,ok(`Application "${name}" saved successfully.`));
  }catch(e){
    badge.className='badge badge-error';badge.textContent='Error';
    showEl('appSaveResult-'+idx,err(`Failed: ${e.message}`));
  }
}
async function saveConnSettings(){
  const url=document.getElementById('appdHost').value.trim();
  const account=document.getElementById('appdAccount').value.trim();
  const tokenEnv=document.getElementById('appdTokenEnv').value.trim();
  const nodes=parseInt(document.getElementById('defaultNodeCount').value)||3;
  if(!url||!account||!tokenEnv){alert('⚠ Controller URL, Account Name and Token Env Var are required.');return;}
  showEl('appdConnResult',wait('Saving connection settings...'));
  try{
    await apiPost(`${API}/config/appd`,{lob_name:lobName,controller_url:url,account_name:account,token_env_var:tokenEnv,default_node_count:nodes});
    showEl('appdConnResult',ok('Connection settings saved successfully.'));
  }catch(e){showEl('appdConnResult',err(`Failed to save: ${e.message}`));}
}
async function testAppdConn(){
  showEl('appdConnResult',wait('Testing AppDynamics connection...'));
  try{
    const d=await apiGet('http://localhost:8000/api/health/appd');
    if(d.status==='ok'){showEl('appdConnResult',ok(`Connected to AppDynamics. Status: ${d.status}.`));}
    else{showEl('appdConnResult',err(`Connection check returned: ${d.status}`));}
  }catch(e){showEl('appdConnResult',err(`Connection error: ${e.message}`));}
}
function logout(){sessionStorage.clear();window.location.href='../landing.html';}
init();
</script>
</body>
</html>
