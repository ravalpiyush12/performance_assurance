<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Result Analysis - Selection</title>
    <link rel="stylesheet" href="../../css/global.css">
</head>
<body>
    <div class="top-nav"><a href="../landing.html" class="nav-link">🏠 Home</a></div>
<div class="container" style="margin-top:80px">
        <div class="platform-header">
            <h1>📊 Test Result Analysis</h1>
            <p>Select LOB and Release to view test results</p>
        </div>

        <div class="card">
            <h2 style="font-weight:800;margin-bottom:25px;">Step 1: Select Test Parameters</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Line of Business <span class="required">*</span></label>
                    <select id="lobSelect" onchange="loadReleases()">
                        <option value="">-- Select LOB --</option>
                        <option value="Digital Technology">Digital Technology</option>
                        <option value="Payments">Payments</option>
                        <option value="Corporate">Corporate</option>
                        <option value="Retail Banking">Retail Banking</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Release Name <span class="required">*</span></label>
                    <select id="releaseSelect" onchange="loadTests()" disabled>
                        <option value="">-- Select Release --</option>
                    </select>
                </div>
            </div>

            <div id="testsSection" class="hidden" style="margin-top:30px;">
                <h3 style="font-weight:800;margin-bottom:20px;">Step 2: Select Test to View Report</h3>
                
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>PC Run ID</th>
                            <th>Test Name</th>
                            <th>Track</th>
                            <th>Test Date</th>
                            <th>Duration</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="testsTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div style="margin-top:20px;">
            <button class="btn btn-secondary" onclick="window.location.href='../landing.html'">← Back to Home</button>
        </div>
    </div>

    <script>
        // DUMMY DATA - Replace with actual API calls
        const RELEASES_DATA = {
            'Digital Technology': [
                'Release 2.5',
                'Release 2.4',
                'Release 2.3',
                'Release 2.2'
            ],
            'Payments': [
                'Payment Gateway v3.1',
                'Payment Gateway v3.0'
            ],
            'Corporate': [
                'Corporate Platform 1.5'
            ],
            'Retail Banking': [
                'Retail Banking 4.2',
                'Retail Banking 4.1'
            ]
        };

        const TESTS_DATA = {
            'Release 2.5': [
                { pc_run_id: '65989', name: 'Peak Load Test', track: 'CDV3', date: '2026-03-14', duration: '30 min', status: 'Completed' },
                { pc_run_id: '65985', name: 'Stress Test', track: 'CDV3', date: '2026-03-13', duration: '40 min', status: 'Completed' },
                { pc_run_id: '65980', name: 'Endurance Test', track: 'Track1', date: '2026-03-12', duration: '60 min', status: 'Completed' },
                { pc_run_id: '65975', name: 'Spike Test', track: 'CDV3', date: '2026-03-11', duration: '30 min', status: 'Completed' }
            ],
            'Release 2.4': [
                { pc_run_id: '65745', name: 'Regression Test', track: 'CDV3', date: '2026-03-08', duration: '45 min', status: 'Completed' },
                { pc_run_id: '65740', name: 'Load Test', track: 'CDV3', date: '2026-03-07', duration: '30 min', status: 'Completed' }
            ],
            'Payment Gateway v3.1': [
                { pc_run_id: '65234', name: 'Payment Processing Test', track: 'PayTrack1', date: '2026-03-10', duration: '30 min', status: 'Completed' }
            ]
        };

        function loadReleases() {
            const lob = document.getElementById('lobSelect').value;
            const releaseSelect = document.getElementById('releaseSelect');
            
            releaseSelect.innerHTML = '<option value="">-- Select Release --</option>';
            document.getElementById('testsSection').classList.add('hidden');
            
            if (lob && RELEASES_DATA[lob]) {
                RELEASES_DATA[lob].forEach(release => {
                    const option = document.createElement('option');
                    option.value = release;
                    option.textContent = release;
                    releaseSelect.appendChild(option);
                });
                releaseSelect.disabled = false;
            } else {
                releaseSelect.disabled = true;
            }
        }

        function loadTests() {
            const release = document.getElementById('releaseSelect').value;
            const tbody = document.getElementById('testsTableBody');
            
            tbody.innerHTML = '';
            
            if (release && TESTS_DATA[release]) {
                const tests = TESTS_DATA[release];
                
                tests.forEach(test => {
                    const row = document.createElement('tr');
                    row.className = 'clickable';
                    row.innerHTML = `
                        <td><strong>${test.pc_run_id}</strong></td>
                        <td>${test.name}</td>
                        <td>${test.track}</td>
                        <td>${test.date}</td>
                        <td>${test.duration}</td>
                        <td><span class="badge badge-success">${test.status}</span></td>
                        <td>
                            <button class="btn btn-primary" style="padding:8px 16px;font-size:13px;" 
                                    onclick="viewTestReport('${test.pc_run_id}', '${test.name}')">
                                📊 View Report
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                
                document.getElementById('testsSection').classList.remove('hidden');
            } else {
                document.getElementById('testsSection').classList.add('hidden');
            }
        }

        function viewTestReport(pcRunId, testName) {
            // Store in sessionStorage for report page
            sessionStorage.setItem('selectedTest', JSON.stringify({
                pc_run_id: pcRunId,
                test_name: testName,
                lob: document.getElementById('lobSelect').value,
                release: document.getElementById('releaseSelect').value
            }));
            
            window.location.href = 'test-report.html';
        }
    </script>
</body>
</html>
