<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - CQE NFT</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body { padding: 20px; background: var(--bg-gradient); }
        
        .page-header {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }
        
        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: var(--bg-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .filter-section {
            background: white;
            padding: 25px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .logs-section {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }
        
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .category-tab {
            padding: 12px 24px;
            background: #f3f4f6;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            color: #6b7280;
            transition: all 0.3s;
        }
        
        .category-tab:hover {
            background: #e5e7eb;
            color: #374151;
        }
        
        .category-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .audit-log {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 5px solid #e5e7eb;
            transition: all 0.3s;
        }
        
        .audit-log:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .audit-log.user-mgmt { border-left-color: #3b82f6; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); }
        .audit-log.lob-config { border-left-color: #10b981; background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); }
        .audit-log.appd { border-left-color: #f59e0b; background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
        .audit-log.db-ops { border-left-color: #ef4444; background: linear-gradient(135deg, #fef2f2 0%, #fecaca 100%); }
        .audit-log.monitoring { border-left-color: #8b5cf6; background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); }
        
        .audit-time {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .audit-action {
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 16px;
            color: #111827;
        }
        
        .audit-details {
            font-size: 14px;
            color: #374151;
            margin-bottom: 8px;
        }
        
        .audit-user {
            font-size: 13px;
            color: #6b7280;
            font-weight: 600;
        }
        
        .audit-table {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📋 Audit Logs</h1>
            <p style="color:#6b7280;font-size:16px;font-weight:500;">Track all administrative changes and database operations</p>
        </div>

        <div class="filter-section">
            <h3 style="margin-bottom:20px;font-weight:800;">🔍 Filters</h3>
            <div class="filter-grid">
                <div class="form-group">
                    <label>Date From</label>
                    <input type="date" id="dateFrom" value="2026-03-01">
                </div>
                <div class="form-group">
                    <label>Date To</label>
                    <input type="date" id="dateTo" value="2026-03-14">
                </div>
                <div class="form-group">
                    <label>User</label>
                    <select id="userFilter">
                        <option value="">All Users</option>
                        <option value="admin@company.com"><template class="__cf_email__" data-cfemail="b2d3d6dfdbdcf2d1dddfc2d3dccb9cd1dddf">[email&#160;protected]</template></option>
                        <option value="john@company.com"><template class="__cf_email__" data-cfemail="fc96939492bc9f93918c9d9285d29f9391">[email&#160;protected]</template></option>
                        <option value="sarah@company.com"><template class="__cf_email__" data-cfemail="1c6f7d6e7d745c7f73716c7d7265327f7371">[email&#160;protected]</template></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Table</label>
                    <select id="tableFilter">
                        <option value="">All Tables</option>
                        <option value="USERS">USERS</option>
                        <option value="LOB_CONFIG">LOB_CONFIG</option>
                        <option value="APPD_APPS">APPD_APPS</option>
                        <option value="MASTER_TEST_RUN">MASTER_TEST_RUN</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
            <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
            <button class="btn btn-secondary" onclick="exportLogs()">📥 Export CSV</button>
        </div>

        <div class="logs-section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;">
                <h3 style="font-weight:800;">Activity Log</h3>
                <button class="btn btn-secondary btn-small" onclick="refreshLogs()">🔄 Refresh</button>
            </div>

            <div class="category-tabs">
                <button class="category-tab active" onclick="filterCategory('all')">All Categories</button>
                <button class="category-tab" onclick="filterCategory('user-mgmt')">👥 User Management</button>
                <button class="category-tab" onclick="filterCategory('lob-config')">🏢 LOB Config</button>
                <button class="category-tab" onclick="filterCategory('appd')">📊 AppDynamics</button>
                <button class="category-tab" onclick="filterCategory('db-ops')">🗄️ DB Operations</button>
                <button class="category-tab" onclick="filterCategory('monitoring')">⚡ Monitoring</button>
            </div>

            <div id="logsContainer">
                <!-- Logs will be populated here -->
            </div>
        </div>
    </div>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
        const DUMMY_LOGS = [

                details: 'Started monitoring for PC Run ID: 65989',
                user: 'normaluser@company.com',
                table: 'MASTER_TEST_RUN',
                query: "INSERT INTO MASTER_TEST_RUN VALUES (65989, 'Digital Technology', ...)"
            },
            {
                category: 'db-ops',
                time: '2026-03-14 08:30:55',
                action: '🗄️ SQL File Uploaded',
                details: 'Uploaded and executed batch_update.sql (45 statements)',
                user: 'admin@company.com',
                table: 'MULTIPLE',
                query: "-- File: batch_update.sql (45 statements executed)"
            },
            {
                category: 'user-mgmt',
                time: '2026-03-14 08:15:33',
                action: '🔐 User Password Reset',
                details: 'Password reset for user john@company.com',
                user: 'admin@company.com',
                table: 'USERS',
                query: "UPDATE USERS SET password_hash = ... WHERE email = 'john@company.com'"
            },
            {
                category: 'appd',
                time: '2026-03-14 08:00:19',
                action: '🔄 AppD Configuration Updated',
                details: 'Updated config NFT_Digital_Technology_CDV3_12Mar2026_2342',
                user: 'john@company.com',
                table: 'APPD_CONFIGS',
                query: "UPDATE APPD_CONFIGS SET modified_date = SYSDATE WHERE config_name = ..."
            },
            {
                category: 'lob-config',
                time: '2026-03-13 17:30:45',
                action: '🏢 Database Connection Added',
                details: 'Added new Oracle DB connection PRODDB02 to Digital Technology',
                user: 'admin@company.com',
                table: 'DB_CONNECTIONS',
                query: "INSERT INTO DB_CONNECTIONS VALUES ('PRODDB02', 'Digital Technology', ...)"
            },
            {

                time: '2026-03-13 16:45:22',
                action: '⏹ Monitoring Session Stopped',
                details: 'Stopped monitoring for PC Run ID: 65745',
                user: 'normaluser@company.com',
                table: 'MASTER_TEST_RUN',
                query: "UPDATE MASTER_TEST_RUN SET status = 'STOPPED' WHERE pc_run_id = 65745"
            }
        ];

        let currentCategory = 'all';

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            const filteredLogs = currentCategory === 'all' 
                ? DUMMY_LOGS 
                : DUMMY_LOGS.filter(log => log.category === currentCategory);

            if (filteredLogs.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#9ca3af;padding:40px;">No logs found for selected filters</p>';
                return;
            }

            let html = '';
            filteredLogs.forEach(log => {
                html += `
                    <div class="audit-log ${log.category}">
                        <div class="audit-time">${log.time}</div>
                        <div class="audit-action">${log.action}</div>
                        <div class="audit-details">${log.details}</div>
                        <div style="margin:10px 0;">
                            <span class="audit-table">${log.table}</span>
                        </div>
                        <div class="audit-user">👤 User: ${log.user}</div>
                        <details style="margin-top:10px;">
                            <summary style="cursor:pointer;font-weight:700;color:#6b7280;font-size:13px;">View SQL Query</summary>
                            <pre style="background:#111827;color:#10b981;padding:15px;border-radius:8px;margin-top:10px;overflow-x:auto;font-size:12px;">${log.query}</pre>
                        </details>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderLogs();
        }

        function applyFilters() {
            alert('✓ Filters applied (in production, this will filter by date, user, and table)');
        }

        function resetFilters() {
            document.getElementById('dateFrom').value = '2026-03-01';
            document.getElementById('dateTo').value = '2026-03-14';
            document.getElementById('userFilter').value = '';
            document.getElementById('
