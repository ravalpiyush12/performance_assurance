<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>MongoDB Configuration</title><link rel="stylesheet" href="../css/main.css"></head>
<body style="padding:20px;background:var(--bg-gradient);"><div class="container" style="max-width:900px;">
<div style="background:white;padding:40px;border-radius:16px;box-shadow:var(--card-shadow);">
<h1 style="font-size:28px;font-weight:800;margin-bottom:30px;">🍃 MongoDB Configuration</h1>
<div class="form-grid"><div class="form-group"><label>MongoDB URI</label><input type="text" placeholder="mongodb://mongo.company.com:27017"></div>
<div class="form-group"><label>Database Name</label><input type="text" placeholder="performance_db"></div>
<div class="form-group"><label>Username</label><input type="text" placeholder="mongo_user"></div>
<div class="form-group"><label>Password</label><input type="password" placeholder="********"></div>
<div class="form-group"><label>Collections</label><input type="text" placeholder="metrics,logs,transactions"></div></div>
<button class="btn btn-primary" onclick="alert('✓ MongoDB configuration saved')">Save Configuration</button>
<button class="btn btn-secondary" onclick="history.back()">Cancel</button></div></div></body></html>
