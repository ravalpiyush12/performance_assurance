<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Performance Center Configuration</title><link rel="stylesheet" href="../css/main.css"></head>
<body style="padding:20px;background:var(--bg-gradient);"><div class="container" style="max-width:900px;">
<div style="background:white;padding:40px;border-radius:16px;box-shadow:var(--card-shadow);">
<h1 style="font-size:28px;font-weight:800;margin-bottom:30px;">⚡ Performance Center Configuration</h1>
<div class="form-grid"><div class="form-group"><label>PC URL</label><input type="url" placeholder="https://pc.nam.nsroot.net"></div>
<div class="form-group"><label>Port</label><input type="number" placeholder="450" value="450"></div>
<div class="form-group"><label>Domain</label><input type="text" placeholder="DEFAULT"></div>
<div class="form-group"><label>Project</label><input type="text" placeholder="MyProject"></div>
<div class="form-group"><label>Username</label><input type="text" placeholder="pc_user"></div>
<div class="form-group"><label>Password</label><input type="password" placeholder="********"></div></div>
<button class="btn btn-primary" onclick="alert('✓ PC configuration saved')">Save Configuration</button>
<button class="btn btn-secondary" onclick="history.back()">Cancel</button></div></div></body></html>
