<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Monitoring - Select LOB</title>
<link rel="stylesheet" href="../../css/global.css">
<style>
.lob-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:30px}
.lob-card{background:white;border-radius:18px;padding:30px 20px;text-align:center;box-shadow:var(--card-shadow);cursor:pointer;border:3px solid transparent;transition:all .3s}
.lob-card:hover{transform:translateY(-6px);box-shadow:var(--card-hover);border-color:var(--primary)}
.lob-card.selected{border-color:var(--primary);background:linear-gradient(135deg,#eff6ff,#dbeafe);box-shadow:0 0 0 4px rgba(102,126,234,.2)}
.lob-icon{font-size:48px;margin-bottom:14px}
.lob-name{font-size:18px;font-weight:800;margin-bottom:6px}
.lob-meta{font-size:12px;color:#6b7280}
.lob-tracks{margin-top:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:5px}
.track-chip{background:#eff6ff;color:var(--primary);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <div class="platform-header">
    <h1>⚡ Test Monitoring Activity</h1>
    <p>Select your Line of Business to begin</p>
  </div>

  <div class="card" style="max-width:900px;margin:0 auto">
    <div class="alert alert-info"><span>ℹ️</span><span>Select your LOB. You will be asked to login on the next step. Admin users will access all configuration screens for that LOB.</span></div>

    <div class="lob-grid" id="lobGrid"></div>

    <div style="text-align:center;margin-top:30px;display:flex;gap:15px;justify-content:center">
      <button class="btn btn-secondary" onclick="window.location.href='../landing.html'">← Back to Home</button>
      <button class="btn btn-primary" id="continueBtn" disabled onclick="continueToLogin()">Continue to Login →</button>
    </div>
  </div>
</div>

<script>
const LOBS = [
  {id:'DigitalTech', name:'Digital Technology', icon:'💻', tracks:['CDV3','Track1','Track2'], desc:'3 tracks · 6 apps'},
  {id:'Payments',    name:'Payments',           icon:'💳', tracks:['PayTrack1','PayTrack2'],   desc:'2 tracks · 4 apps'},
  {id:'Corporate',   name:'Corporate',          icon:'🏢', tracks:['CorpTrack1'],              desc:'1 track · 3 apps'},
  {id:'Retail',      name:'Retail Banking',     icon:'🏦', tracks:['RetailTrack1','RetailTrack2'], desc:'2 tracks · 5 apps'},
  {id:'Wealth',      name:'Wealth Management',  icon:'📈', tracks:['WealthTrack1'],            desc:'1 track · 2 apps'},
  {id:'Insurance',   name:'Insurance',          icon:'🛡️', tracks:['InsureTrack1'],            desc:'1 track · 2 apps'},
];

let selectedLob = null;

function renderLOBs() {
  const grid = document.getElementById('lobGrid');
  grid.innerHTML = LOBS.map(l => `
    <div class="lob-card" id="lc-${l.id}" onclick="selectLob('${l.id}')">
      <div class="lob-icon">${l.icon}</div>
      <div class="lob-name">${l.name}</div>
      <div class="lob-meta">${l.desc}</div>
      <div class="lob-tracks">${l.tracks.map(t=>`<span class="track-chip">${t}</span>`).join('')}</div>
    </div>`).join('');
}

function selectLob(id) {
  selectedLob = LOBS.find(l=>l.id===id);
  document.querySelectorAll('.lob-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('lc-'+id).classList.add('selected');
  document.getElementById('continueBtn').disabled = false;
}

function continueToLogin() {
  if (!selectedLob) return;
  sessionStorage.setItem('selectedLob', JSON.stringify(selectedLob));
  window.location.href = 'login.html';
}

renderLOBs();
</script>
</body>
</html>
