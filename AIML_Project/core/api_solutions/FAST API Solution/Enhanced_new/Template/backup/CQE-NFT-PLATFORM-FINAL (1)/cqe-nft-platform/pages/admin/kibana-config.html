<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibana Configuration</title>
    <link rel="stylesheet" href="../../css/global.css">
</head>
<body>
    <div class="top-nav">
        <a href="dashboard.html" class="nav-link">← Admin Dashboard</a>
        <a href="api-docs.html" class="nav-link">📖 API Docs</a>
        <a href="audit-logs.html" class="nav-link">📋 Audit Logs</a>
        <a href="#" class="nav-link" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="container" style="margin-top:80px;">
        <div class="platform-header">
            <h1>Kibana Configuration</h1>
            <p>Configure Kibana connection and settings</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Connection URL</label>
                <input type="text" value="https://kibana.company.com" readonly style="background:#f9fafb;">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" value="admin">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" value="••••••••">
                </div>
            </div>

            <button class="btn btn-success" onclick="testConnection()">🔍 Test Connection</button>
            <button class="btn btn-primary" onclick="saveConfig()">💾 Save Configuration</button>
        </div>

        <div id="testResult" class="card hidden">
            <div class="alert alert-success">
                <span>✓</span>
                <span>Connection successful! Kibana is responding correctly.</span>
            </div>
        </div>
    </div>

    <script>
        function testConnection() {
            document.getElementById('testResult').classList.remove('hidden');
        }

        function saveConfig() {
            alert('✓ Configuration saved successfully!');
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../landing.html';
        }
    </script>
</body>
</html>
