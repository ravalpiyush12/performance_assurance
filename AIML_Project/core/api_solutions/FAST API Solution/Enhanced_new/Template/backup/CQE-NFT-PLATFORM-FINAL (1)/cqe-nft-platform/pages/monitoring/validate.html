<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validate Prerequisites</title>
    <link rel="stylesheet" href="../../css/global.css">
    <style>
        .validation-accordion {
            margin-top: 25px;
        }
        
        .accordion-item {
            background: white;
            border-radius: 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 5px solid #e5e7eb;
        }
        
        .accordion-header:hover {
            background: #f9fafb;
        }
        
        .accordion-header.ok { border-left-color: #10b981; background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%); }
        .accordion-header.error { border-left-color: #ef4444; background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); }
        .accordion-header.warning { border-left-color: #f59e0b; background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
        
        .accordion-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .accordion-icon {
            font-size: 32px;
        }
        
        .accordion-title {
            font-size: 20px;
            font-weight: 800;
            color: #111827;
        }
        
        .accordion-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        
        .status-badge.ok { background: #10b981; color: white; }
        .status-badge.error { background: #ef4444; color: white; }
        .status-badge.warning { background: #f59e0b; color: white; }
        
        .expand-icon {
            font-size: 24px;
            transition: transform 0.3s;
            color: #6b7280;
        }
        
        .accordion-item.expanded .expand-icon {
            transform: rotate(180deg);
        }
        
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            padding: 0 25px;
        }
        
        .accordion-item.expanded .accordion-content {
            max-height: 2000px;
            padding: 25px;
            border-top: 2px solid #f3f4f6;
        }
        
        .app-detail {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
            border-left: 4px solid #e5e7eb;
        }
        
        .app-detail.has-error { border-left-color: #ef4444; background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); }
        .app-detail.all-ok { border-left-color: #10b981; background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%); }
        
        .app-name {
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
        }
        
        .tier-item {
            padding: 12px 15px;
            background: white;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #e5e7eb;
        }
        
        .tier-item.ok { border-left-color: #10b981; }
        .tier-item.error { border-left-color: #ef4444; background: #fef2f2; }
        
        .tier-name { font-weight: 700; font-size: 14px; }
        .tier-status { font-size: 13px; color: #6b7280; }
        .tier-gap { color: #ef4444; font-weight: 700; font-size: 13px; }
        
        .url-status {
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .url-status.up { background: #ecfdf5; color: #065f46; }
        .url-status.down { background: #fef2f2; color: #991b1b; }
        
        .db-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        
        .db-item {
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14px;
        }
        
        .db-item.connected { background: #ecfdf5; color: #065f46; }
        .db-item.disconnected { background: #fef2f2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="pre-login.html" class="nav-link">← Back</a>
    </div>

    <div class="container" style="margin-top:80px;">
        <div class="platform-header">
            <h1>✓ Validate Prerequisites</h1>
            <p>Check all monitoring tools before starting - Click to expand details</p>
        </div>

        <div class="card">
            <div class="alert alert-info">
                <span>ℹ️</span>
                <span>LOB: <strong id="lobDisplay">-</strong> | Track: <strong id="trackDisplay">-</strong></span>
            </div>

            <button class="btn btn-primary" onclick="validatePrerequisites()">🔍 Run Validation</button>
            
            <div id="validationResults" class="hidden">
                <div class="validation-accordion" id="accordionContainer"></div>
                
                <div style="margin-top:30px;display:flex;gap:15px;">
                    <button class="btn btn-secondary" onclick="history.back()">← Back</button>
                    <button class="btn btn-success" onclick="proceedToLogin()" style="flex:1;">
                        ✓ Validation Complete - Proceed to Login →
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const setup = JSON.parse(sessionStorage.getItem('monitoringSetup') || '{}');
        document.getElementById('lobDisplay').textContent = setup.lob || '-';
        document.getElementById('trackDisplay').textContent = setup.track || '-';

        const VALIDATION_DATA = {
            appd: {
                apps: [
                    {
                        name: 'icg-tts-cirp-ng-173720_PTE',
                        tiers: [
                            { name: 'Web Tier', activeNodes: 3, expected: 3, status: 'ok' },
                            { name: 'App Tier', activeNodes: 2, expected: 3, status: 'error' },
                            { name: 'DB Tier', activeNodes: 3, expected: 3, status: 'ok' }
                        ]
                    },
                    {
                        name: 'CDV3_NFT_Digital_Technology',
                        tiers: [
                            { name: 'API Tier', activeNodes: 4, expected: 3, status: 'ok' },
                            { name: 'Service Tier', activeNodes: 3, expected: 3, status: 'ok' }
                        ]
                    },
                    {
                        name: 'CIRP_Digital_Tech',
                        tiers: [
                            { name: 'Frontend', activeNodes: 1, expected: 3, status: 'error' },
                            { name: 'Backend', activeNodes: 3, expected: 3, status: 'ok' }
                        ]
                    }
                ]
            },
            kibana: { url: 'https://kibana.company.com', status: 'up' },
            splunk: { url: 'https://splunk.company.com:8089', status: 'up' },
            mongodb: { url: 'mongodb://mongo.company.com:27017', status: 'up' },
            databases: [
                { name: 'CQE_NFT', status: 'connected' },
                { name: 'CD_PTE_READ', status: 'connected' },
                { name: 'CAS_PTE_READ', status: 'connected' },
                { name: 'PRODDB01', status: 'connected' },
                { name: 'PORTAL_PTE_READ', status: 'disconnected' }
            ]
        };

        function toggleAccordion(element) {
            element.classList.toggle('expanded');
        }

        function validatePrerequisites() {
            const data = VALIDATION_DATA;
            const container = document.getElementById('accordionContainer');
            
            let html = '';

            // AppDynamics Accordion
            const appdIssueCount = data.appd.apps.filter(app => 
                app.tiers.some(tier => tier.status === 'error')
            ).length;
            const appdStatus = appdIssueCount > 0 ? 'error' : 'ok';

            html += `
                <div class="accordion-item">
                    <div class="accordion-header ${appdStatus}" onclick="toggleAccordion(this.parentElement)">
                        <div class="accordion-left">
                            <span class="accordion-icon">📊</span>
                            <span class="accordion-title">AppDynamics</span>
                        </div>
                        <div class="accordion-status">
                            <span class="status-badge ${appdStatus}">
                                ${appdIssueCount > 0 ? `⚠ ${appdIssueCount} ISSUE${appdIssueCount > 1 ? 'S' : ''}` : '✓ ALL OK'}
                            </span>
                            <span class="expand-icon">▼</span>
                        </div>
                    </div>
                    <div class="accordion-content">
                        <p style="color:#6b7280;margin-bottom:20px;font-size:14px;">
                            Application and tier-level health check • Expected nodes: 3 (default)
                        </p>
            `;

            data.appd.apps.forEach(app => {
                const hasError = app.tiers.some(tier => tier.status === 'error');
                html += `
                    <div class="app-detail ${hasError ? 'has-error' : 'all-ok'}">
                        <div class="app-name">
                            <span>${hasError ? '⚠' : '✓'}</span>
                            <span>${app.name}</span>
                        </div>
                        <div class="tier-grid">
                `;

                app.tiers.forEach(tier => {
                    const gap = tier.expected - tier.activeNodes;
                    html += `
                        <div class="tier-item ${tier.status}">
                            <div>
                                <div class="tier-name">${tier.name}</div>
                                <div class="tier-status">Active: ${tier.activeNodes} / Expected: ${tier.expected}</div>
                            </div>
                            ${tier.status === 'error' 
                                ? `<div class="tier-gap">Gap: ${gap}</div>` 
                                : '<div style="color:#10b981;font-weight:700;font-size:13px;">✓ OK</div>'}
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            html += `</div></div>`;

            // Kibana, Splunk, MongoDB, Databases accordions...
            ['kibana', 'splunk', 'mongodb'].forEach(tool => {
                const toolData = data[tool];
                const icon = tool === 'kibana' ? '📈' : tool === 'splunk' ? '🔍' : '🍃';
                const title = tool.charAt(0).toUpperCase() + tool.slice(1);
                
                html += `
                    <div class="accordion-item">
                        <div class="accordion-header ${toolData.status === 'up' ? 'ok' : 'error'}" onclick="toggleAccordion(this.parentElement)">
                            <div class="accordion-left">
                                <span class="accordion-icon">${icon}</span>
                                <span class="accordion-title">${title}</span>
                            </div>
                            <div class="accordion-status">
                                <span class="status-badge ${toolData.status === 'up' ? 'ok' : 'error'}">
                                    ${toolData.status === 'up' ? '✓ UP' : '✗ DOWN'}
                                </span>
                                <span class="expand-icon">▼</span>
                            </div>
                        </div>
                        <div class="accordion-content">
                            <p style="color:#6b7280;margin-bottom:15px;font-size:14px;">URL accessibility check</p>
                            <div class="url-status ${toolData.status}">
                                <span style="font-size:20px;">${toolData.status === 'up' ? '✓' : '✗'}</span>
                                <div>
                                    <div style="font-weight:700;">${toolData.url}</div>
                                    <div style="font-size:13px;">${toolData.status === 'up' ? 'Connected successfully' : 'Connection failed'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Databases
            const connectedCount = data.databases.filter(db => db.status === 'connected').length;
            const dbStatus = connectedCount === data.databases.length ? 'ok' : 'warning';

            html += `
                <div class="accordion-item">
                    <div class="accordion-header ${dbStatus}" onclick="toggleAccordion(this.parentElement)">
                        <div class="accordion-left">
                            <span class="accordion-icon">🗄️</span>
                            <span class="accordion-title">Oracle Databases</span>
                        </div>
                        <div class="accordion-status">
                            <span class="status-badge ${dbStatus}">
                                ${connectedCount}/${data.databases.length} Connected
                            </span>
                            <span class="expand-icon">▼</span>
                        </div>
                    </div>
                    <div class="accordion-content">
                        <p style="color:#6b7280;margin-bottom:15px;font-size:14px;">Database connection status</p>
                        <div class="db-grid">
            `;

            data.databases.forEach(db => {
                html += `
                    <div class="db-item ${db.status}">
                        <span style="font-size:18px;">${db.status === 'connected' ? '✓' : '✗'}</span>
                        <span>${db.name}</span>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
            document.getElementById('validationResults').classList.remove('hidden');
        }

        function proceedToLogin() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
