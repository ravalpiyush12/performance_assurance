<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Console</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body { padding: 20px; background: var(--bg-gradient); }
        
        .db-header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
        }
        
        .db-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .console-section {
            background: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
        }
        
        .sql-editor {
            width: 100%;
            min-height: 200px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: #1f2937;
            color: #10b981;
            resize: vertical;
        }
        
        .sql-editor:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }
        
        .results-table th {
            background: #1f2937;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 800;
            border: 1px solid #374151;
        }
        
        .results-table td {
            padding: 10px;
            border: 1px solid #e5e7eb;
            background: white;
        }
        
        .results-table tr:nth-child(even) td {
            background: #f9fafb;
        }
        
        .status-success {
            background: #ecfdf5;
            border-left: 4px solid #10b981;
            padding: 15px;
            border-radius: 8px;
            color: #065f46;
            font-weight: 700;
        }
        
        .status-error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            color: #991b1b;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="db-header">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <h1 style="font-size:28px;font-weight:800;margin-bottom:5px;">💻 Database Console</h1>
                    <p style="color:#6b7280;">Execute SQL queries via Cyberarc authenticated connections</p>
                </div>
                <button class="btn btn-secondary" onclick="window.location.href='admin-dashboard.html'">← Back</button>
            </div>

            <div class="db-selector">
                <div class="form-group">
                    <label>Database Connection</label>
                    <select id="dbConnection" onchange="updateApiKey()">
                        <option value="">-- Select Database --</option>
                        <option value="CQE_NFT">CQE_NFT (Primary)</option>
                        <option value="CD_PTE_READ">CD_PTE_READ</option>
                        <option value="CAS_PTE_READ">CAS_PTE_READ</option>
                        <option value="PRODDB01">PRODDB01</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>API Key (Auto-selected)</label>
                    <input type="text" id="apiKey" readonly value="Select database first" style="background:#f3f4f6;">
                </div>
            </div>
        </div>

        <!-- SQL Editor -->
        <div class="console-section">
            <h2 style="font-weight:800;margin-bottom:20px;">✏️ SQL Editor</h2>
            <textarea class="sql-editor" id="sqlQuery" placeholder="Enter your SQL query here...
Example:
SELECT * FROM MASTER_TEST_RUN WHERE pc_run_id = 65989;

UPDATE LOB_CONFIG SET status = 'ACTIVE' WHERE lob_name = 'Digital Technology';

INSERT INTO USERS VALUES ('user@company.com', 'User Name', 'admin');"></textarea>

            <div style="margin-top:20px;display:flex;gap:15px;">
                <button class="btn btn-success" onclick="executeQuery()">▶️ Execute Query</button>
                <button class="btn btn-secondary" onclick="clearEditor()">🗑️ Clear</button>
                <button class="btn btn-secondary" onclick="formatSQL()">✨ Format SQL</button>
            </div>
        </div>

        <!-- File Upload -->
        <div class="console-section">
            <h2 style="font-weight:800;margin-bottom:20px;">📤 Upload SQL File</h2>
            <div style="display:flex;gap:20px;align-items:end;">
                <div class="form-group" style="flex:1;">
                    <label>Select SQL File</label>
                    <input type="file" id="sqlFile" accept=".sql,.txt" style="display:block;padding:10px;">
                </div>
                <button class="btn btn-primary" onclick="uploadAndExecute()">📥 Upload & Execute</button>
            </div>
        </div>

        <!-- Results -->
        <div class="console-section" id="resultsSection" style="display:none;">
            <h2 style="font-weight:800;margin-bottom:20px;">📊 Query Results</h2>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        const DB_API_KEYS = {
            'CQE_NFT': 'cqe_nft_live_vbzAMZC1B0KzpDICU0NrfM3xlYqY3HBXJITJW6VR',
            'CD_PTE_READ': 'cd_pte_read_live_7Xzdbzk0C2wzgXd84Y07iThAMW0jRm0QZ9a3MHr',
            'CAS_PTE_READ': 'cas_pte_read_live_1bpoJc9EDp1hc0TTRee3fsRbLJVH07M6o0DQ1',
            'PRODDB01': 'proddb01_live_5Kz2pQxRt9NhF6Yp3MvT8sA1cB4dE7fG0hJ'
        };

        function updateApiKey() {
            const db = document.getElementById('dbConnection').value;
            const apiKeyField = document.getElementById('apiKey');
            if (db) {
                apiKeyField.value = DB_API_KEYS[db];
                apiKeyField.style.background = '#ecfdf5';
            } else {
                apiKeyField.value = 'Select database first';
                apiKeyField.style.background = '#f3f4f6';
            }
        }

        function executeQuery() {
            const db = document.getElementById('dbConnection').value;
            const query = document.getElementById('sqlQuery').value.trim();

            if (!db) {
                alert('⚠ Please select a database connection');
                return;
            }

            if (!query) {
                alert('⚠ Please enter a SQL query');
                return;
            }

            // Dummy execution
            const queryType = query.toUpperCase().split(' ')[0];
            let resultsHTML = '';

            if (queryType === 'SELECT') {
                // Simulate SELECT results
                resultsHTML = `
                    <div class="status-success">
                        ✓ Query executed successfully in 0.234 seconds
                    </div>
                    <div style="margin-top:20px;">
                        <strong>Rows returned: 3</strong>
                    </div>
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>PC_RUN_ID</th>
                                <th>LOB_NAME</th>
                                <th>TRACK</th>
                                <th>STATUS</th>
                                <th>START_TIME</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>65989</td>
                                <td>Digital Technology</td>
                                <td>CDV3</td>
                                <td>COMPLETED</td>
                                <td>2026-03-14 08:45:23</td>
                            </tr>
                            <tr>
                                <td>65745</td>
                                <td>Digital Technology</td>
                                <td>CDV3</td>
                                <td>STOPPED</td>
                                <td>2026-03-13 16:30:11</td>
                            </tr>
                            <tr>
                                <td>65234</td>
                                <td>Payments</td>
                                <td>PayTrack1</td>
                                <td>RUNNING</td>
                                <td>2026-03-14 09:15:45</td>
                            </tr>
                        </tbody>
                    </table>
                `;
            } else if (queryType === 'INSERT' || queryType === 'UPDATE' || queryType === 'DELETE') {
                // Simulate DML results
                const rowsAffected = Math.floor(Math.random() * 10) + 1;
                resultsHTML = `
                    <div class="status-success">
                        ✓ Query executed successfully in 0.156 seconds
                    </div>
                    <div style="margin-top:20px;">
                        <strong>Rows affected: ${rowsAffected}</strong>
                    </div>
                    <div style="margin-top:15px;padding:15px;background:#f9fafb;border-radius:8px;">
                        <strong>Query:</strong><br>
                        <code style="color:#1f2937;">${query}</code>
                    </div>
                `;
            } else {
                resultsHTML = `
                    <div class="status-error">
                        ✗ Invalid SQL syntax or unsupported operation
                    </div>
                `;
            }

            document.getElementById('resultsContainer').innerHTML = resultsHTML;
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function uploadAndExecute() {
            const fileInput = document.getElementById('sqlFile');
            const db = document.getElementById('dbConnection').value;

            if (!db) {
                alert('⚠ Please select a database connection');
                return;
            }

            if (!fileInput.files.length) {
                alert('⚠ Please select a SQL file');
                return;
            }

            const fileName = fileInput.files[0].name;

            // Simulate file execution
            const resultsHTML = `
                <div class="status-success">
                    ✓ SQL file "${fileName}" uploaded and executed successfully
                </div>
                <div style="margin-top:20px;padding:20px;background:#f9fafb;border-radius:8px;">
                    <h3 style="margin-bottom:15px;">Execution Summary</h3>
                    <table style="width:100%;">
                        <tr>
                            <td style="padding:8px;font-weight:700;">File Name:</td>
                            <td style="padding:8px;">${fileName}</td>
                        </tr>
                        <tr>
                            <td style="padding:8px;font-weight:700;">Database:</td>
                            <td style="padding:8px;">${db}</td>
                        </tr>
                        <tr>
                            <td style="padding:8px;font-weight:700;">Statements Executed:</td>
                            <td style="padding:8px;">45</td>
                        </tr>
                        <tr>
                            <td style="padding:8px;font-weight:700;">Successful:</td>
                            <td style="padding:8px;color:#10b981;font-weight:700;">43</td>
                        </tr>
                        <tr>
                            <td style="padding:8px;font-weight:700;">Failed:</td>
                            <td style="padding:8px;color:#ef4444;font-weight:700;">2</td>
                        </tr>
                        <tr>
                            <td style="padding:8px;font-weight:700;">Execution Time:</td>
                            <td style="padding:8px;">1.234 seconds</td>
                        </tr>
                    </table>
                </div>
            `;

            document.getElementById('resultsContainer').innerHTML = resultsHTML;
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function clearEditor() {
            document.getElementById('sqlQuery').value = '';
        }

        function formatSQL() {
            let query = document.getElementById('sqlQuery').value;
            // Simple formatting (in production, use proper SQL formatter)
            query = query.replace(/\bSELECT\b/gi, 'SELECT')
                         .replace(/\bFROM\b/gi, '\nFROM')
                         .replace(/\bWHERE\b/gi, '\nWHERE')
                         .replace(/\bAND\b/gi, '\n  AND')
                         .replace(/\bOR\b/gi, '\n  OR');
            document.getElementById('sqlQuery').value = query;
        }
    </script>
</body>
</html>
