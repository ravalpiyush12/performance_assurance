<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test MongoDB Connection</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body style="padding:20px;background:var(--bg-gradient);">
    <div class="container" style="max-width:800px;">
        <div style="background:white;padding:40px;border-radius:16px;box-shadow:var(--card-shadow);">
            <h1 style="font-size:28px;font-weight:800;margin-bottom:30px;">🍃 Test MongoDB Connection</h1>
            
            <div class="form-group">
                <label>MongoDB URI</label>
                <input type="text" id="mongoUri" value="mongodb://mongo.company.com:27017" readonly style="background:#f3f4f6;">
            </div>

            <button class="btn btn-primary" onclick="testConnection()" id="testBtn">🔍 Test Connection</button>
            
            <div id="testResult" style="display:none;margin-top:30px;">
                <div style="background:#ecfdf5;border-left:5px solid #10b981;padding:20px;border-radius:12px;">
                    <h3 style="color:#065f46;margin-bottom:15px;">✓ Connection Successful!</h3>
                    <div style="font-size:14px;color:#047857;">
                        <div style="margin-bottom:8px;"><strong>URI:</strong> mongodb://mongo.company.com:27017</div>
                        <div style="margin-bottom:8px;"><strong>Status:</strong> Connected</div>
                        <div style="margin-bottom:8px;"><strong>Response Time:</strong> 89ms</div>
                        <div style="margin-bottom:8px;"><strong>Version:</strong> 6.0.3</div>
                        <div style="margin-bottom:8px;"><strong>Replica Set:</strong> rs0</div>
                        <div style="margin-bottom:8px;"><strong>Nodes:</strong> 3 nodes active</div>
                    </div>
                </div>
            </div>

            <button class="btn btn-secondary" onclick="window.location.href='admin-dashboard.html'" style="margin-top:20px;">← Back</button>
        </div>
    </div>

    <script>
        function testConnection() {
            document.getElementById('testBtn').disabled = true;
            document.getElementById('testBtn').textContent = '⏳ Testing...';
            
            setTimeout(() => {
                document.getElementById('testResult').style.display = 'block';
                document.getElementById('testBtn').disabled = false;
                document.getElementById('testBtn').textContent = '🔍 Test Connection';
            }, 1500);
        }
    </script>
</body>
</html>
