<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>LOB Configuration</title><link rel="stylesheet" href="../css/main.css"></head>
<body style="padding:20px;background:var(--bg-gradient);"><div class="container" style="max-width:900px;">
<div style="background:white;padding:40px;border-radius:16px;box-shadow:var(--card-shadow);">
<h1 style="font-size:28px;font-weight:800;margin-bottom:30px;">🏢 LOB Configuration</h1>
<div class="form-grid"><div class="form-group"><label>LOB Name</label><select id="lob"><option>Digital Technology</option><option>Payments</option><option>Corporate</option></select></div>
<div class="form-group"><label>Track Name</label><input type="text" id="track" placeholder="e.g., CDV4"></div>
<div class="form-group"><label>Database Connection</label><input type="text" id="db" placeholder="e.g., PRODDB03"></div>
<div class="form-group"><label>Status</label><select><option>Active</option><option>Inactive</option></select></div></div>
<button class="btn btn-primary" onclick="alert('✓ LOB configuration saved')">Save Configuration</button>
<button class="btn btn-secondary" onclick="history.back()">Cancel</button></div></div></body></html>
