<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Kibana Configuration</title><link rel="stylesheet" href="../css/main.css"></head>
<body style="padding:20px;background:var(--bg-gradient);"><div class="container" style="max-width:900px;">
<div style="background:white;padding:40px;border-radius:16px;box-shadow:var(--card-shadow);">
<h1 style="font-size:28px;font-weight:800;margin-bottom:30px;">📈 Kibana Configuration</h1>
<div class="form-grid"><div class="form-group"><label>Kibana URL</label><input type="url" placeholder="https://kibana.company.com"></div>
<div class="form-group"><label>Port</label><input type="number" placeholder="9200"></div>
<div class="form-group"><label>Username</label><input type="text" placeholder="kibana_user"></div>
<div class="form-group"><label>Password</label><input type="password" placeholder="********"></div>
<div class="form-group"><label>Index Pattern</label><input type="text" placeholder="logs-*"></div>
<div class="form-group"><label>Dashboard ID</label><input type="text" placeholder="dashboard-123"></div></div>
<button class="btn btn-primary" onclick="alert('✓ Kibana configuration saved')">Save Configuration</button>
<button class="btn btn-secondary" onclick="history.back()">Cancel</button></div></div></body></html>
