<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CQE NFT</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 32px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #374151;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #6b7280;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🔐 Admin Access</h1>
                <p style="color: #6b7280;">Configuration & Management Portal</p>
            </div>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter admin username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            
            <div class="form-group">
                <label>Authenticator Code (Optional)</label>
                <input type="text" id="totp" placeholder="6-digit code" maxlength="6">
            </div>
            
            <button class="btn btn-primary btn-block" onclick="performLogin()">
                🔓 Login to Admin Dashboard
            </button>
            
            <div class="back-link">
                <a href="main-monitoring.html">← Back to Main Monitoring</a>
            </div>
        </div>
    </div>
    
    <script>
        function performLogin() {
            // Dummy authentication
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username && password) {
                // In real implementation, call Auth API
                alert('✓ Login successful!');
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('⚠ Please enter username and password');
            }
        }
    </script>
</body>
</html>
