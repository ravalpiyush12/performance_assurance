<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splunk Configuration</title>
<link rel="stylesheet" href="../../css/global.css">
<style>
.dash-block{border:2px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px;background:white}
.dash-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.data-preview{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px;margin-top:10px;font-size:13px}
.data-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;margin-top:10px;font-size:13px;color:#92400e}
</style>
</head>
<body>
<div class="top-nav">
  <a href="dashboard.html" class="nav-link">← Admin Dashboard</a>
  <a href="audit-logs.html" class="nav-link">📋 Audit Logs</a>
  <a href="#" class="nav-link" onclick="logout()">🚪 Logout</a>
</div>
<div class="container" style="margin-top:80px">
  <div class="platform-header"><h1>🔍 Splunk Configuration</h1><p>LOB: <strong id="lobLabel">—</strong></p></div>

  <div class="card">
    <h3 style="font-weight:800;margin-bottom:20px">🔌 Connection Settings</h3>
    <div class="form-grid">
      <div class="form-group"><label>Splunk Base URL <span class="required">*</span></label><input type="text" id="splUrl" value="https://splunk.corp.internal:8089"></div>
      <div class="form-group"><label>HEC Token / API Token <span class="required">*</span></label><input type="password" id="splToken" value="hec-token-xxxxxxxx"></div>
      <div class="form-group"><label>Default Index</label><input type="text" id="splIndex" value="cards_prod" placeholder="Default Splunk index"></div>
      <div class="form-group"><label>Search Timeout (s)</label><input type="number" id="splTimeout" value="60"></div>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-success" onclick="testConn()">🔍 Test Connection</button>
      <button class="btn btn-primary" onclick="saveConn()">💾 Save</button>
    </div>
    <div id="connResult" style="margin-top:12px;display:none"></div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <h3 style="font-weight:800;margin:0">📋 Saved Searches / Dashboard Configurations</h3>
      <button class="btn btn-primary" style="padding:9px 18px;font-size:13px" onclick="addDash()">➕ Add Search</button>
    </div>
    <div class="alert alert-info"><span>ℹ️</span><span>Map Splunk saved searches or dashboard IDs to tracks. Use <strong>Test</strong> to verify data capture. If no data, contact Application Development team.</span></div>
    <div id="dashList"></div>
  </div>
</div>

<template id="tmpl">
  <div class="dash-block" id="dash-__IDX__">
    <div class="dash-block-header">
      <span style="font-weight:700;font-size:15px">Search/Dashboard __NUM__</span>
      <div style="display:flex;gap:8px">
        <span class="badge" id="dstatus-__IDX__" style="background:#e5e7eb;color:#374151">Not Tested</span>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="removeDash(__IDX__)">✕</button>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Search Name / Dashboard ID <span class="required">*</span></label><input type="text" id="dId-__IDX__" placeholder="Saved search name or dashboard ID"></div>
      <div class="form-group"><label>User-Defined Display Name <span class="required">*</span></label><input type="text" id="dName-__IDX__" placeholder="e.g. Error Analysis — CDV3"></div>
      <div class="form-group"><label>Track <span class="required">*</span></label>
        <select id="dTrack-__IDX__"><option value="">-- Select Track --</option><option>CDV3</option><option>Track1</option><option>Track2</option><option>PayTrack1</option><option>PayTrack2</option><option>CorpTrack1</option></select>
      </div>
      <div class="form-group"><label>Type</label>
        <select id="dType-__IDX__"><option value="search">Saved Search (SPL)</option><option value="dashboard">Dashboard ID</option></select>
      </div>
    </div>
    <div class="form-group"><label>SPL Query (if Saved Search)</label><textarea id="dSpl-__IDX__" rows="2" placeholder="index=app_logs sourcetype=access_log | stats count by status"></textarea></div>
    <button class="btn btn-success" style="padding:8px 16px;font-size:13px" onclick="testDash(__IDX__)">🔍 Test — Check Data</button>
    <div id="dResult-__IDX__" style="display:none"></div>
  </div>
</template>

<script>
const lob = JSON.parse(sessionStorage.getItem('selectedLob') || '{}');
document.getElementById('lobLabel').textContent = lob.name || '—';
let dc = 0;
const INIT = [
  {id:'Error_Rate_CDV3', name:'Error Rate Analysis — CDV3', track:'CDV3', type:'search', spl:'index=cards_prod sourcetype=app_log | stats count by http_status'},
  {id:'Slow_Txn_CDV3', name:'Slow Transactions — CDV3', track:'CDV3', type:'search', spl:'index=cards_prod response_time>2000 | table txn_name, response_time'},
  {id:'PayTrack1_Events', name:'Payment Events — PayTrack1', track:'PayTrack1', type:'search', spl:'index=payments sourcetype=pay_log | stats count by event_type'},
];

function addDash(prefill) {
  const idx = dc++;
  const tmpl = document.getElementById('tmpl').innerHTML.replace(/__IDX__/g,idx).replace(/__NUM__/g,idx+1);
  const wrap = document.createElement('div'); wrap.innerHTML = tmpl;
  document.getElementById('dashList').appendChild(wrap.firstElementChild);
  if (prefill) {
    document.getElementById('dId-'+idx).value = prefill.id;
    document.getElementById('dName-'+idx).value = prefill.name;
    document.getElementById('dTrack-'+idx).value = prefill.track;
    document.getElementById('dType-'+idx).value = prefill.type;
    document.getElementById('dSpl-'+idx).value = prefill.spl || '';
  }
}
function removeDash(idx) { const el=document.getElementById('dash-'+idx); if(el) el.remove(); }
function testDash(idx) {
  const el=document.getElementById('dResult-'+idx);
  el.style.display='block'; el.innerHTML='<div class="data-preview">⏳ Running search...</div>';
  setTimeout(()=>{
    const ok=Math.random()>0.25;
    const badge=document.getElementById('dstatus-'+idx);
    if(ok){ badge.className='badge badge-success'; badge.textContent='✓ Data Found';
      el.innerHTML=`<div class="data-preview"><strong>✓ Search returned data</strong><br><br>Events: <strong>24,187</strong> · Error events: <strong>8,421</strong> · Unique errors: <strong>14</strong><br><small style="color:#065f46">Last event: ${new Date().toLocaleTimeString()}</small></div>`;
    } else { badge.className='badge badge-error'; badge.textContent='✗ No Data';
      el.innerHTML='<div class="data-warn"><strong>⚠ Search returned 0 results.</strong><br><br>Possible causes: wrong index, wrong sourcetype, or no data being ingested for this track.<br><br><strong>👉 Please contact the Application Development team to verify Splunk data ingestion.</strong></div>';
    }
  },1600);
}
function testConn() {
  const el=document.getElementById('connResult'); el.style.display='block';
  el.innerHTML='<div class="alert alert-info"><span>⏳</span><span>Testing Splunk connection...</span></div>';
  setTimeout(()=>{ el.innerHTML='<div class="alert alert-success"><span>✓</span><span>Connected to Splunk 9.1.0. HEC endpoint reachable. Index lag: &lt;2s.</span></div>'; },1500);
}
function saveConn() { alert('✓ Splunk connection settings saved.'); }
function logout() { sessionStorage.clear(); window.location.href='../landing.html'; }
INIT.forEach(d=>addDash(d));
</script>
</body>
</html>
