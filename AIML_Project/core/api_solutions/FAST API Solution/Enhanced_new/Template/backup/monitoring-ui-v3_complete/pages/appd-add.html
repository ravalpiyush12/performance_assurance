<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Add AppD Application</title><link rel="stylesheet" href="../css/main.css"></head>
<body style="padding:20px;background:var(--bg-gradient);"><div class="container" style="max-width:900px;">
<div style="background:white;padding:40px;border-radius:16px;box-shadow:var(--card-shadow);">
<h1 style="font-size:28px;font-weight:800;margin-bottom:30px;">📊 Add AppDynamics Application</h1>
<div class="form-grid"><div class="form-group"><label>Application Name</label><input type="text" placeholder="e.g., ServiceTech_API"></div>
<div class="form-group"><label>Track</label><select><option>CDV3</option><option>Track1</option></select></div>
<div class="form-group"><label>Application ID</label><input type="text" placeholder="AppD Application ID"></div>
<div class="form-group"><label>Tier Name</label><input type="text" placeholder="Default tier name"></div></div>
<button class="btn btn-primary" onclick="alert('✓ AppD application added')">Add Application</button>
<button class="btn btn-secondary" onclick="history.back()">Cancel</button></div></div></body></html>
