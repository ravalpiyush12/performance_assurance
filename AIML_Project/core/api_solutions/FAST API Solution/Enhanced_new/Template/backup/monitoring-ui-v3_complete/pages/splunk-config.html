<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Splunk Configuration</title><link rel="stylesheet" href="../css/main.css"></head>
<body style="padding:20px;background:var(--bg-gradient);"><div class="container" style="max-width:900px;">
<div style="background:white;padding:40px;border-radius:16px;box-shadow:var(--card-shadow);">
<h1 style="font-size:28px;font-weight:800;margin-bottom:30px;">🔍 Splunk Configuration</h1>
<div class="form-grid"><div class="form-group"><label>Splunk URL</label><input type="url" placeholder="https://splunk.company.com"></div>
<div class="form-group"><label>Port</label><input type="number" placeholder="8089"></div>
<div class="form-group"><label>Username</label><input type="text" placeholder="splunk_user"></div>
<div class="form-group"><label>Password</label><input type="password" placeholder="********"></div>
<div class="form-group"><label>Search Query</label><input type="text" placeholder="index=main source=app"></div></div>
<button class="btn btn-primary" onclick="alert('✓ Splunk configuration saved')">Save Configuration</button>
<button class="btn btn-secondary" onclick="history.back()">Cancel</button></div></div></body></html>
